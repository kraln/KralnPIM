accounts:
  - id: "personal-imap"
    type: imap
    display_name: "Personal"
    imap_host: "mail.example.com"
    imap_port: 993
    imap_tls: true
    smtp_host: "mail.example.com"
    smtp_port: 587
    username: "user@example.com"

  - id: "work-google"
    type: google
    display_name: "Work (Google)"
    # Uses built-in OAuth credentials — no client_id/client_secret needed
    calendars: []

  - id: "work-o365"
    type: office365
    display_name: "Work (O365)"
    # Uses built-in OAuth credentials — no client_id/tenant_id needed
    calendars: []

  - id: "my-radicale"
    type: caldav
    display_name: "Radicale"
    username: "user@example.com"
    # password stored in DB after setup
    calendars:
      - id: "personal"
        type: caldav
        url: "https://radicale.example.com/user/personal.ics"
      - id: "family"
        type: caldav
        url: "https://radicale.example.com/user/family.ics"

ui:
  timezone_primary: "America/New_York"
  timezone_secondary: "Europe/London"

system:
  weather_location: "40.7128,-74.0060"
  weather_location_name: "New York"
  weather_provider: "open-meteo"

storage:
  db_path: "~/.pim/pim.db"
  attachment_download_dir: "~/Downloads/pim-attachments"
  buffer_months_back: 6
  buffer_months_forward: 6

server:
  listen_address: "127.0.0.1"
  rest_port: 9400
  ws_port: 9401
